<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>世界刻度 · Sewindwolf</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500;700&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="stylesheet" href="home.css" />
</head>
<body>
  <div class="stars-layer" id="starsLayer"></div>

  <header class="home-header">
    <div class="header-inner">
      <div class="site-logo">
        <span class="logo-icon">⬡</span>
        <span class="logo-title">SEWINDWOLF</span>
      </div>
      <button class="theme-toggle" id="themeToggle" title="切换明暗模式">
        <span class="theme-icon" id="themeIcon">🌙</span>
      </button>
    </div>
  </header>

  <main class="home-main">
    <section class="home-hero">
      <div class="hero-glyph">⬡</div>
      <h1 class="home-title">世界刻度</h1>
      <p class="home-subtitle">每个世界都有自己的时间流速。<br/>选择一个世界，观测其中发生的故事。</p>
    </section>

    <!-- 世界一 -->
    <section class="world-section">
      <div class="world-section-header">
        <h2 class="world-section-title">
          <span class="world-number">I</span>
          <span>第一世界</span>
        </h2>
        <span class="world-section-status open">运行中</span>
      </div>
      <div class="world-grid">
        <!-- 炉火镇 - 可点击 -->
        <a href="/luhuo" class="world-entry active">
          <div class="world-entry-icon">🔥</div>
          <div class="world-entry-info">
            <h3 class="world-entry-name">炉火镇</h3>
            <p class="world-entry-desc">矿石、篝火与旅人。一座安静燃烧的边陲小镇。</p>
          </div>
          <div class="world-entry-arrow">→</div>
          <div class="world-entry-glow"></div>
        </a>
        <!-- 潮汐湾 - 灰色 -->
        <div class="world-entry locked">
          <div class="world-entry-icon">🌊</div>
          <div class="world-entry-info">
            <h3 class="world-entry-name">潮汐湾 · 深海邮局</h3>
            <p class="world-entry-desc">海浪声中的信件与回忆。</p>
          </div>
          <span class="lock-badge">即将开放</span>
        </div>
        <!-- 占位 -->
        <div class="world-entry locked">
          <div class="world-entry-icon">🏔️</div>
          <div class="world-entry-info">
            <h3 class="world-entry-name">???</h3>
            <p class="world-entry-desc">尚未探明的区域。</p>
          </div>
          <span class="lock-badge">未开放</span>
        </div>
      </div>
    </section>

    <!-- 世界二 -->
    <section class="world-section dimmed">
      <div class="world-section-header">
        <h2 class="world-section-title">
          <span class="world-number">II</span>
          <span>第二世界</span>
        </h2>
        <span class="world-section-status locked">未开放</span>
      </div>
      <div class="world-grid">
        <div class="world-entry locked placeholder">
          <div class="world-entry-icon">✦</div>
          <div class="world-entry-info">
            <h3 class="world-entry-name">???</h3>
            <p class="world-entry-desc">这个世界的时间还未开始流动。</p>
          </div>
          <span class="lock-badge">未开放</span>
        </div>
      </div>
    </section>

    <!-- 世界三 -->
    <section class="world-section dimmed">
      <div class="world-section-header">
        <h2 class="world-section-title">
          <span class="world-number">III</span>
          <span>第三世界</span>
        </h2>
        <span class="world-section-status locked">未开放</span>
      </div>
      <div class="world-grid">
        <div class="world-entry locked placeholder">
          <div class="world-entry-icon">✦</div>
          <div class="world-entry-info">
            <h3 class="world-entry-name">???</h3>
            <p class="world-entry-desc">这个世界的时间还未开始流动。</p>
          </div>
          <span class="lock-badge">未开放</span>
        </div>
      </div>
    </section>
  </main>

  <footer class="home-footer">
    <span class="footer-logo">⬡ SEWINDWOLF</span>
    <span class="footer-sep">·</span>
    <span>每个世界都有自己的时间</span>
  </footer>

  <script>
    // 主题
    const themeKey = 'sw_theme';
    function initTheme() {
      const saved = localStorage.getItem(themeKey);
      const theme = saved || 'dark';
      applyTheme(theme);
    }
    function applyTheme(theme) {
      if (theme === 'light') {
        document.documentElement.setAttribute('data-theme', 'light');
      } else {
        document.documentElement.removeAttribute('data-theme');
      }
      const icon = document.getElementById('themeIcon');
      if (icon) icon.textContent = theme === 'light' ? '☀️' : '🌙';
      localStorage.setItem(themeKey, theme);
    }
    function toggleTheme() {
      const current = localStorage.getItem(themeKey) || 'dark';
      applyTheme(current === 'dark' ? 'light' : 'dark');
    }
    initTheme();
    document.getElementById('themeToggle').addEventListener('click', toggleTheme);

    // 星空粒子
    (function() {
      const layer = document.getElementById('starsLayer');
      const count = 60;
      for (let i = 0; i < count; i++) {
        const star = document.createElement('div');
        star.className = 'star';
        star.style.left = Math.random() * 100 + '%';
        star.style.top = Math.random() * 100 + '%';
        star.style.animationDelay = (Math.random() * 4) + 's';
        star.style.animationDuration = (2 + Math.random() * 3) + 's';
        const size = 1 + Math.random() * 2;
        star.style.width = size + 'px';
        star.style.height = size + 'px';
        layer.appendChild(star);
      }
    })();
  </script>
</body>
</html>
