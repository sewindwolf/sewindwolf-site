<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="ocean" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4FC3F7"/>
      <stop offset="50%" stop-color="#29B6F6"/>
      <stop offset="100%" stop-color="#0288D1"/>
    </linearGradient>
    <linearGradient id="land" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#81C784"/>
      <stop offset="40%" stop-color="#66BB6A"/>
      <stop offset="100%" stop-color="#43A047"/>
    </linearGradient>
    <linearGradient id="sand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFD54F"/>
      <stop offset="100%" stop-color="#FFB300"/>
    </linearGradient>
    <radialGradient id="shine" cx="0.35" cy="0.3" r="0.5">
      <stop offset="0%" stop-color="rgba(255,255,255,0.4)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
  </defs>
  <!-- 海洋底色 -->
  <circle cx="32" cy="32" r="30" fill="url(#ocean)"/>
  <!-- 大陆板块 -->
  <ellipse cx="20" cy="22" rx="13" ry="10" fill="url(#land)" opacity="0.9"/>
  <ellipse cx="40" cy="38" rx="14" ry="11" fill="url(#land)" opacity="0.85"/>
  <ellipse cx="47" cy="18" rx="7" ry="5" fill="url(#land)" opacity="0.8"/>
  <ellipse cx="14" cy="42" rx="6" ry="4" fill="url(#land)" opacity="0.75"/>
  <!-- 沙漠点缀 -->
  <ellipse cx="24" cy="28" rx="4" ry="2.5" fill="url(#sand)" opacity="0.5"/>
  <!-- 高光 -->
  <circle cx="32" cy="32" r="30" fill="url(#shine)"/>
  <!-- 经纬线 -->
  <ellipse cx="32" cy="32" rx="30" ry="12" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="0.6" transform="rotate(-23 32 32)"/>
  <ellipse cx="32" cy="32" rx="12" ry="30" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="0.6"/>
  <!-- 外圈描边 -->
  <circle cx="32" cy="32" r="30" fill="none" stroke="#1565C0" stroke-width="1.2" opacity="0.25"/>
</svg>
