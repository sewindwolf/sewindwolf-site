<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OC Posts Editor</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>OC Posts Editor</h1>
    <div class="header-actions">
      <select id="charFilter">
        <option value="all">全部角色</option>
      </select>
      <input type="text" id="searchInput" placeholder="搜索文案/ID...">
      <button id="deployBtn" class="btn-deploy">Git Push 部署</button>
    </div>
  </header>

  <div class="stats" id="stats"></div>

  <main id="postsList"></main>

  <!-- 编辑弹窗 -->
  <div class="modal-overlay" id="editModal">
    <div class="modal">
      <div class="modal-header">
        <h2>编辑动态</h2>
        <button class="btn-close" onclick="closeModal()">&times;</button>
      </div>
      <div class="modal-body">
        <div class="edit-row">
          <label>ID</label>
          <input type="text" id="editId" readonly>
        </div>
        <div class="edit-row">
          <label>角色</label>
          <input type="text" id="editChar" readonly>
        </div>
        <div class="edit-row">
          <label>时间</label>
          <input type="text" id="editTime" readonly>
        </div>
        <div class="edit-row">
          <label>游戏时间</label>
          <input type="text" id="editGameTime">
        </div>
        <div class="edit-row">
          <label>地点</label>
          <input type="text" id="editLocation">
        </div>
        <div class="edit-row">
          <label>心情</label>
          <input type="text" id="editMood">
        </div>
        <div class="edit-row">
          <label>标签 (逗号分隔)</label>
          <input type="text" id="editTags">
        </div>
        <div class="edit-row">
          <label>图片URL</label>
          <input type="text" id="editImageUrl">
          <button class="btn-sm" onclick="previewImage()">预览</button>
        </div>
        <div class="edit-row img-preview-row">
          <img id="imagePreview" src="" alt="preview" style="display:none;">
        </div>
        <div class="edit-row">
          <label>生图提示词 (image_prompt)</label>
          <textarea id="editImagePrompt" rows="8" placeholder="填写用于生成图片的Prompt，点击重新生图时会使用此内容..."></textarea>
        </div>
        <div class="edit-row">
          <label>文案内容</label>
          <textarea id="editContent" rows="10"></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-cancel" onclick="closeModal()">取消</button>
        <button class="btn-save" onclick="savePost()">保存</button>
      </div>
    </div>
  </div>

  <!-- 确认弹窗 -->
  <div class="modal-overlay" id="confirmModal">
    <div class="modal modal-sm">
      <div class="modal-header"><h2>确认操作</h2></div>
      <div class="modal-body"><p id="confirmText"></p></div>
      <div class="modal-footer">
        <button class="btn-cancel" onclick="closeConfirm()">取消</button>
        <button class="btn-danger" id="confirmOk">确认</button>
      </div>
    </div>
  </div>

  <!-- 重新生图弹窗 (Multi-mode) -->
  <div class="modal-overlay" id="regenModal">
    <div class="modal modal-lg">
      <div class="modal-header">
        <h2>🔄 重新生图</h2>
        <button class="btn-close" onclick="closeRegenModal()">&times;</button>
      </div>
      <div class="modal-body">
        <div class="regen-info">
          <div><strong>角色：</strong><span id="regenChar"></span></div>
          <div><strong>帖子：</strong><span id="regenId"></span></div>
        </div>

        <div class="edit-row" style="margin-top:12px;">
          <label>提示词 (可编辑后再生成)</label>
          <textarea id="regenPromptPreview" rows="6"></textarea>
        </div>

        <div class="regen-options">
          <label>生成数量：</label>
          <div class="count-btns">
            <button class="count-btn active" data-count="1">1张</button>
            <button class="count-btn" data-count="2">2张</button>
            <button class="count-btn" data-count="3">3张</button>
            <button class="count-btn" data-count="4">4张</button>
          </div>
          <span class="regen-tip">多张生成后可从中挑选最佳</span>
        </div>

        <!-- Candidates Grid (hidden initially) -->
        <div id="candidatesSection" class="candidates-section" style="display:none;">
          <div class="candidates-header">
            <h3>📸 候选图片</h3>
            <span id="candidatesProgress" class="candidates-progress"></span>
          </div>
          <div id="candidatesGrid" class="candidates-grid"></div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-cancel" onclick="closeRegenModal()">取消</button>
        <button class="btn-regen" id="regenStartBtn" onclick="startRegen()">开始生成</button>
        <button class="btn-apply" id="regenApplyBtn" onclick="applySelected()" style="display:none;">✅ 使用选中图片</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="app.js"></script>
</body>
</html>
